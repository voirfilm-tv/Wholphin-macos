name: Wholphin Web CI

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Enforce initial asset budgets
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const files = [];
          function walk(dir) { for (const name of fs.readdirSync(dir)) { const p = path.join(dir, name); const s = fs.statSync(p); s.isDirectory() ? walk(p) : files.push({ p, size: s.size }); } }
          walk('dist/assets');
          const js = files.filter(f => f.p.endsWith('.js'));
          const css = files.filter(f => f.p.endsWith('.css'));
          const initialJs = js.filter(f => !f.p.includes('hls')).reduce((sum, f) => sum + f.size, 0);
          const cssSize = css.reduce((sum, f) => sum + f.size, 0);
          if (initialJs > 260000) throw new Error(`JavaScript initial trop lourd: ${initialJs} octets`);
          if (cssSize > 90000) throw new Error(`CSS trop lourd: ${cssSize} octets`);
          console.log({ initialJs, cssSize, files });
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: wholphin-web-dist
          path: web/dist

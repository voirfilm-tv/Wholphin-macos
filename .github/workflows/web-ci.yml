name: Wholphin Web CI

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  push:
    branches:
      - main
      - agent/add-wholphin-web
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package.json
      - name: Install dependencies
        shell: bash
        run: |
          set +e
          npm install --no-audit --no-fund > npm-install.log 2>&1
          status=$?
          tail -n 120 npm-install.log
          exit $status
      - name: TypeScript strict check
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Enforce initial asset budgets
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const files = [];
          function walk(dir) { for (const name of fs.readdirSync(dir)) { const p = path.join(dir, name); const s = fs.statSync(p); s.isDirectory() ? walk(p) : files.push({ p, size: s.size }); } }
          walk('dist/assets');
          const js = files.filter(f => f.p.endsWith('.js'));
          const css = files.filter(f => f.p.endsWith('.css'));
          const initialJs = js.filter(f => !f.p.includes('hls')).reduce((sum, f) => sum + f.size, 0);
          const cssSize = css.reduce((sum, f) => sum + f.size, 0);
          if (initialJs > 260000) throw new Error(`JavaScript initial trop lourd: ${initialJs} octets`);
          if (cssSize > 110000) throw new Error(`CSS trop lourd: ${cssSize} octets`);
          console.log({ initialJs, cssSize, files });
          NODE
      - name: Install Chromium for TV tests
        run: npx playwright install --with-deps chromium
      - name: Run TV and visual E2E tests
        run: npm run test:e2e -- --project=chromium-tv --project=chromium-720p
      - uses: actions/upload-artifact@v5
        with:
          name: wholphin-web-dist
          path: web/dist
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: wholphin-web-playwright
          path: |
            web/playwright-report
            web/test-results
          retention-days: 30
